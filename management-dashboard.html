<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROUP COMMAND — 管理ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Sans+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN SYSTEM
   Aesthetic: Command Center — warm dark, amber accents
   密度の高い情報設計 / スクロールなしで全店舗を俯瞰
============================================================ */
:root {
  --bg:        #0a0905;
  --bg1:       #0e0c08;
  --bg2:       #131008;
  --bg3:       #1a160d;
  --border:    #2a2318;
  --border2:   #342c1c;
  --amber:     #e8a020;
  --amber-dim: rgba(232,160,32,0.08);
  --amber-mid: rgba(232,160,32,0.18);
  --green:     #4ade80;
  --green-dim: rgba(74,222,128,0.08);
  --red:       #f87171;
  --red-dim:   rgba(248,113,113,0.08);
  --blue:      #60a5fa;
  --blue-dim:  rgba(96,165,250,0.08);
  --text:      #d4c4a0;
  --text-mid:  #7a6a50;
  --text-dim:  #3a3020;
  --syne:      'Syne', sans-serif;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'Noto Sans JP', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  height: 100vh;
  overflow: hidden;
  display: grid;
  grid-template-rows: 48px 1fr;
}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg1);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  font-family: var(--syne);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.15em;
  color: var(--amber);
}

.logo span { color: var(--text-mid); }

.topbar-sep {
  width: 1px;
  height: 16px;
  background: var(--border2);
}

.topbar-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-mid);
  text-transform: uppercase;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.clock {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--amber);
  letter-spacing: 0.1em;
}

.status-dot {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--green);
  text-transform: uppercase;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}

/* ── LAYOUT ─────────────────────────────────────────────────── */
.dashboard {
  display: grid;
  grid-template-columns: 200px 1fr 220px;
  grid-template-rows: 1fr;
  height: 100%;
  overflow: hidden;
}

/* ── LEFT SIDEBAR ────────────────────────────────────────────── */
.sidebar {
  border-right: 1px solid var(--border);
  background: var(--bg1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}

.sidebar-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* KPI cards */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.kpi {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 8px;
  position: relative;
  overflow: hidden;
}

.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 2px; height: 100%;
  background: var(--amber);
  opacity: 0.6;
}

.kpi-val {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  line-height: 1;
  color: var(--amber);
  margin-bottom: 3px;
}

.kpi-key {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--text-mid);
  letter-spacing: 0.1em;
}

.kpi.green::before { background: var(--green); }
.kpi.green .kpi-val { color: var(--green); }
.kpi.red::before { background: var(--red); }
.kpi.red .kpi-val { color: var(--red); }
.kpi.blue::before { background: var(--blue); }
.kpi.blue .kpi-val { color: var(--blue); }

/* Store nav */
.store-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
}

.store-list::-webkit-scrollbar { display: none; }

.store-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.12s;
}

.store-item:hover { background: var(--amber-dim); }
.store-item.active {
  border-left-color: var(--amber);
  background: var(--amber-dim);
}

.store-item-name {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  letter-spacing: 0.04em;
}

.store-item.active .store-item-name { color: var(--amber); }

.store-item-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--green);
  font-weight: 600;
}

.store-item-badge {
  font-family: var(--mono);
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 2px;
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.2);
}

/* ── MAIN ────────────────────────────────────────────────────── */
.main {
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
  background: var(--bg);
}

/* Store header */
.store-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg1);
}

.store-name-display {
  font-family: var(--syne);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.05em;
}

.store-meta {
  display: flex;
  align-items: center;
  gap: 16px;
}

.store-meta-item {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-mid);
  display: flex;
  align-items: center;
  gap: 6px;
}

.store-meta-val { color: var(--amber); }

/* Cast grid */
.cast-grid-wrap {
  overflow-y: auto;
  padding: 16px 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.cast-grid-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.cast-grid-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.cast-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}

.cast-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 10px;
  cursor: pointer;
  transition: border-color 0.12s;
  position: relative;
}

.cast-card:hover { border-color: var(--border2); }
.cast-card.on { border-left: 2px solid var(--green); }
.cast-card.off { opacity: 0.5; }
.cast-card.break { border-left: 2px solid var(--amber); }

.cast-avatar {
  width: 32px;
  height: 32px;
  border-radius: 2px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mid);
  margin-bottom: 8px;
}

.cast-card.on .cast-avatar { color: var(--green); border-color: rgba(74,222,128,0.3); }

.cast-name {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  margin-bottom: 3px;
  color: var(--text);
}

.cast-status {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.1em;
}

.cast-status.on { color: var(--green); }
.cast-status.off { color: var(--text-dim); }
.cast-status.break { color: var(--amber); }

.cast-time {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-mid);
  margin-top: 4px;
}

/* Timeline bar */
.timeline-bar {
  padding: 10px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg1);
}

.timeline-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.timeline-track {
  position: relative;
  height: 28px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.timeline-now {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--amber);
  opacity: 0.8;
  z-index: 10;
}

.timeline-now::after {
  content: '';
  position: absolute;
  top: 50%;
  left: -3px;
  transform: translateY(-50%);
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--amber);
}

.timeline-block {
  position: absolute;
  top: 4px;
  height: 20px;
  border-radius: 2px;
  display: flex;
  align-items: center;
  padding: 0 5px;
  overflow: hidden;
}

.timeline-block-name {
  font-family: var(--mono);
  font-size: 8px;
  white-space: nowrap;
  overflow: hidden;
}

.timeline-hours {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}

.timeline-hour {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--text-dim);
}

/* ── RIGHT PANEL ─────────────────────────────────────────────── */
.right-panel {
  border-left: 1px solid var(--border);
  background: var(--bg1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-section {
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-section.flex1 {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
}

.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}

.panel-head-title {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
  text-transform: uppercase;
}

.panel-badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 2px;
}

/* Request list */
.request-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

.request-item:hover { background: var(--amber-dim); }

.request-cast {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 3px;
}

.request-date {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-mid);
  margin-bottom: 8px;
}

.request-actions {
  display: flex;
  gap: 6px;
}

.btn {
  flex: 1;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  padding: 4px 0;
  border-radius: 2px;
  border: none;
  cursor: pointer;
  transition: all 0.12s;
  text-transform: uppercase;
}

.btn-approve {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(74,222,128,0.2);
}

.btn-approve:hover {
  background: rgba(74,222,128,0.15);
}

.btn-reject {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.2);
}

.btn-reject:hover {
  background: rgba(248,113,113,0.15);
}

/* Performance */
.perf-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
}

.perf-name {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-mid);
  width: 56px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.perf-bar-bg {
  flex: 1;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}

.perf-bar-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}

.perf-val {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--amber);
  width: 28px;
  text-align: right;
}

/* Alert feed */
.alert-item {
  display: flex;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
}

.alert-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}

.alert-text {
  font-family: var(--mono);
  font-size: 9px;
  line-height: 1.6;
  color: var(--text-mid);
}

.alert-time {
  display: block;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Tooltip */
.tooltip {
  position: fixed;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 1000;
  min-width: 160px;
}

.tooltip.show { opacity: 1; }

.tooltip-name {
  font-weight: 600;
  color: var(--amber);
  margin-bottom: 6px;
  font-size: 11px;
}

.tooltip-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  color: var(--text-mid);
  margin-bottom: 2px;
}

.tooltip-val { color: var(--text); }

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.cast-card {
  animation: fadeInUp 0.25s ease both;
}

/* Scanline effect */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 9999;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo">NAKASU<span>.</span>GROUP</div>
    <div class="topbar-sep"></div>
    <div class="topbar-title">Command Dashboard</div>
  </div>
  <div class="topbar-right">
    <div class="status-dot"><div class="dot"></div>LIVE</div>
    <div class="topbar-sep"></div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<!-- MAIN LAYOUT -->
<div class="dashboard">

  <!-- LEFT: KPI + STORE NAV -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">// GROUP KPI</div>
      <div class="kpi-grid">
        <div class="kpi green">
          <div class="kpi-val" id="kpi-online">0</div>
          <div class="kpi-key">出勤中</div>
        </div>
        <div class="kpi">
          <div class="kpi-val" id="kpi-total">0</div>
          <div class="kpi-key">在籍総数</div>
        </div>
        <div class="kpi red">
          <div class="kpi-val" id="kpi-requests">0</div>
          <div class="kpi-key">申請待ち</div>
        </div>
        <div class="kpi blue">
          <div class="kpi-val" id="kpi-stores">0</div>
          <div class="kpi-key">営業中店舗</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1; overflow:hidden; display:flex; flex-direction:column; padding:0;">
      <div style="padding: 10px 14px 6px; flex-shrink:0;">
        <div class="sidebar-label">// STORES</div>
      </div>
      <div class="store-list" id="storeList"></div>
    </div>

  </aside>

  <!-- CENTER: CAST GRID + TIMELINE -->
  <main class="main">

    <div class="store-header">
      <div class="store-name-display" id="storeNameDisplay">—</div>
      <div class="store-meta">
        <div class="store-meta-item">
          ジャンル: <span class="store-meta-val" id="metaGenre">—</span>
        </div>
        <div class="store-meta-item">
          営業時間: <span class="store-meta-val" id="metaHours">—</span>
        </div>
        <div class="store-meta-item">
          出勤: <span class="store-meta-val" id="metaOn">0</span>/<span id="metaTotal">0</span>
        </div>
      </div>
    </div>

    <div class="cast-grid-wrap">
      <div class="cast-grid-label" id="castGridLabel">// CAST — ON STAGE</div>
      <div class="cast-grid" id="castGrid"></div>
    </div>

    <div class="timeline-bar">
      <div class="timeline-label">
        <span>// TODAY'S SCHEDULE</span>
        <span id="timelineDate" style="color:var(--amber)"></span>
      </div>
      <div class="timeline-track" id="timelineTrack">
        <div class="timeline-now" id="timelineNow"></div>
      </div>
      <div class="timeline-hours" id="timelineHours"></div>
    </div>

  </main>

  <!-- RIGHT: REQUESTS + PERF + ALERTS -->
  <aside class="right-panel">

    <div class="panel-section" style="flex:0 0 auto;">
      <div class="panel-head">
        <div class="panel-head-title">// SHIFT REQUESTS</div>
        <div class="panel-badge" style="background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,0.2);" id="reqBadge">0件</div>
      </div>
      <div id="requestList"></div>
    </div>

    <div class="panel-section" style="flex:0 0 auto;">
      <div class="panel-head">
        <div class="panel-head-title">// WEEKLY PERFORMANCE</div>
      </div>
      <div id="perfList"></div>
    </div>

    <div class="panel-section flex1">
      <div class="panel-head" style="position:sticky;top:0;background:var(--bg1);z-index:1;">
        <div class="panel-head-title">// ACTIVITY LOG</div>
      </div>
      <div id="alertList"></div>
    </div>

  </aside>

</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-name" id="ttName"></div>
  <div class="tooltip-row"><span>ステータス</span><span class="tooltip-val" id="ttStatus"></span></div>
  <div class="tooltip-row"><span>シフト</span><span class="tooltip-val" id="ttShift"></span></div>
  <div class="tooltip-row"><span>今週</span><span class="tooltip-val" id="ttWeek"></span></div>
  <div class="tooltip-row"><span>累計</span><span class="tooltip-val" id="ttTotal"></span></div>
</div>

<script>
// =============================================================================
// DATA — ポートフォリオデモ用ダミーデータ
// 本番環境では shift-api の GET /shifts?storeId=X&date=TODAY で取得する
// =============================================================================
const STORES = [
  { id:1, slug:'shop-a', name:'SHOP A',   genre:'ソープランド',     hours:'19:00〜翌5:00', open:true  },
  { id:2, slug:'shop-b', name:'SHOP B',   genre:'デリバリーヘルス', hours:'12:00〜翌6:00', open:true  },
  { id:3, slug:'shop-c', name:'SHOP C',   genre:'メンズエステ',     hours:'11:00〜翌3:00', open:true  },
  { id:4, slug:'shop-d', name:'SHOP D',   genre:'ファッションヘルス',hours:'14:00〜翌4:00', open:true  },
  { id:5, slug:'shop-e', name:'SHOP E',   genre:'ソープランド',     hours:'18:00〜翌5:00', open:false },
  { id:6, slug:'shop-f', name:'SHOP F',   genre:'デリバリーヘルス', hours:'10:00〜翌5:00', open:true  },
  { id:7, slug:'shop-g', name:'SHOP G',   genre:'メンズエステ',     hours:'13:00〜翌2:00', open:true  },
  { id:8, slug:'shop-h', name:'SHOP H',   genre:'ファッションヘルス',hours:'15:00〜翌4:00', open:true  },

// =============================================================================
// CLOCK
// =============================================================================
function updateClock() {
  const now = new Date()
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
}

// =============================================================================
// KPI UPDATE
// =============================================================================
function updateKPI() {
  let totalOnline = 0, totalCasts = 0
  let openStores = 0

  STORES.forEach(s => {
    if (s.open) openStores++
    const casts = CASTS_BY_STORE[s.id] || []
    totalCasts += casts.length
    totalOnline += casts.filter(c => c.status === 'on').length
  })

  animateNum('kpi-online',   totalOnline)
  animateNum('kpi-total',    totalCasts)
  animateNum('kpi-requests', REQUESTS.length)
  animateNum('kpi-stores',   openStores)
  document.getElementById('reqBadge').textContent = `${REQUESTS.length}件`
}

function animateNum(id, target) {
  let cur = 0
  const el = document.getElementById(id)
  const step = Math.ceil(target / 20)
  const t = setInterval(() => {
    cur = Math.min(cur + step, target)
    el.textContent = cur
    if (cur >= target) clearInterval(t)
  }, 30)
}

// =============================================================================
// STORE LIST
// =============================================================================
function renderStoreList() {
  const el = document.getElementById('storeList')
  el.innerHTML = ''
  STORES.forEach((store, i) => {
    const casts   = CASTS_BY_STORE[store.id] || []
    const onCount = casts.filter(c => c.status === 'on').length
    const pending = REQUESTS.filter(r => r.storeId === store.id).length

    const item = document.createElement('div')
    item.className = `store-item${store.id === currentStoreId ? ' active' : ''}`
    item.style.animationDelay = `${i * 0.03}s`
    item.innerHTML = `
      <div>
        <div class="store-item-name">${store.name}</div>
        ${!store.open ? '<div style="font-size:8px;color:var(--text-dim);font-family:var(--mono)">休業中</div>' : ''}
      </div>
      <div style="display:flex;align-items:center;gap:5px;">
        ${pending > 0 ? `<div class="store-item-badge">${pending}</div>` : ''}
        <div class="store-item-count">${onCount}</div>
      </div>
    `
    item.addEventListener('click', () => selectStore(store.id))
    el.appendChild(item)
  })
}

// =============================================================================
// SELECT STORE
// =============================================================================
function selectStore(storeId) {
  currentStoreId = storeId
  renderStoreList()

  const store = STORES.find(s => s.id === storeId)
  const casts = CASTS_BY_STORE[storeId] || []
  const onCount = casts.filter(c => c.status === 'on').length

  document.getElementById('storeNameDisplay').textContent = store.name
  document.getElementById('metaGenre').textContent  = store.genre
  document.getElementById('metaHours').textContent  = store.hours
  document.getElementById('metaOn').textContent     = onCount
  document.getElementById('metaTotal').textContent  = casts.length

  renderCastGrid(casts)
  renderTimeline(casts, store)
}

// =============================================================================
// CAST GRID
// =============================================================================
function renderCastGrid(casts) {
  const el = document.getElementById('castGrid')
  el.innerHTML = ''

  const onCasts  = casts.filter(c => c.status === 'on')
  const brkCasts = casts.filter(c => c.status === 'break')
  const offCasts = casts.filter(c => c.status === 'off')

  const all = [...onCasts, ...brkCasts, ...offCasts]

  all.forEach((cast, i) => {
    const card = document.createElement('div')
    card.className = `cast-card ${cast.status}`
    card.style.animationDelay = `${i * 0.04}s`

    const statusLabel = {on:'出勤中', off:'本日休み', break:'休憩中'}[cast.status]
    const shiftStr = cast.start ? `${cast.start}〜${cast.end}` : '—'

    card.innerHTML = `
      <div class="cast-avatar">${cast.name[0]}</div>
      <div class="cast-name">${cast.name}</div>
      <div class="cast-status ${cast.status}">${statusLabel}</div>
      ${cast.start ? `<div class="cast-time">${shiftStr}</div>` : ''}
    `

    card.addEventListener('mouseenter', (e) => showTooltip(e, cast, statusLabel, shiftStr))
    card.addEventListener('mousemove',  (e) => moveTooltip(e))
    card.addEventListener('mouseleave', hideTooltip)
    el.appendChild(card)
  })
}

// =============================================================================
// TIMELINE
// =============================================================================
function renderTimeline(casts, store) {
  const track = document.getElementById('timelineTrack')
  const hoursEl = document.getElementById('timelineHours')
  document.getElementById('timelineDate').textContent =
    new Date().toLocaleDateString('ja-JP', {month:'numeric', day:'numeric', weekday:'short'})

  // 営業時間を解析（24時間制で表示）
  const START_H = 10  // 表示開始時刻
  const END_H   = 30  // 表示終了時刻（翌6:00 = 30時）
  const RANGE   = END_H - START_H

  // タイムラインのブロックを削除（現在時刻マーカー以外）
  const marker = document.getElementById('timelineNow')
  track.innerHTML = ''
  track.appendChild(marker)

  const colors = [
    'rgba(74,222,128,0.25)',
    'rgba(232,160,32,0.25)',
    'rgba(96,165,250,0.25)',
    'rgba(248,113,113,0.25)',
    'rgba(167,139,250,0.25)',
  ]

  casts.filter(c => c.start).forEach((cast, i) => {
    const sh = parseHour(cast.start)
    const eh = parseHour(cast.end)
    const left  = Math.max(0, (sh - START_H) / RANGE * 100)
    const width = Math.min(100, (eh - START_H) / RANGE * 100) - left

    if (width <= 0) return

    const block = document.createElement('div')
    block.className = 'timeline-block'
    block.style.left    = `${left}%`
    block.style.width   = `${width}%`
    block.style.background = colors[i % colors.length]
    block.innerHTML = `<span class="timeline-block-name" style="color:var(--text);opacity:0.7">${cast.name}</span>`
    track.appendChild(block)
  })

  // 現在時刻マーカー
  const now  = new Date()
  const nowH = now.getHours() + now.getMinutes() / 60
  const nowPos = Math.max(0, Math.min(100, (nowH - START_H) / RANGE * 100))
  marker.style.left = `${nowPos}%`

  // 時刻ラベル
  hoursEl.innerHTML = ''
  for (let h = START_H; h <= END_H; h += 3) {
    const span = document.createElement('span')
    span.className = 'timeline-hour'
    span.textContent = h >= 24 ? `翌${h-24}時` : `${h}時`
    hoursEl.appendChild(span)
  }
}

function parseHour(timeStr) {
  const [h, m] = timeStr.split(':').map(Number)
  let hour = h + m / 60
  if (hour < 10) hour += 24  // 翌日扱い
  return hour
}

// =============================================================================
// REQUESTS
// =============================================================================
function renderRequests() {
  const el = document.getElementById('requestList')
  el.innerHTML = ''

  if (!REQUESTS.length) {
    el.innerHTML = '<div style="padding:14px;font-family:var(--mono);font-size:10px;color:var(--text-dim)">申請はありません</div>'
    return
  }

  REQUESTS.forEach(req => {
    const item = document.createElement('div')
    item.className = 'request-item'
    item.innerHTML = `
      <div class="request-cast">${req.cast} <span style="color:var(--text-mid)">${req.store}</span></div>
      <div class="request-date">${req.date} ${req.time}</div>
      <div class="request-actions">
        <button class="btn btn-approve" onclick="approveRequest(${req.id})">承認</button>
        <button class="btn btn-reject"  onclick="rejectRequest(${req.id})">却下</button>
      </div>
    `
    el.appendChild(item)
  })
}

function approveRequest(id) {
  const idx = REQUESTS.findIndex(r => r.id === id)
  if (idx === -1) return
  const req = REQUESTS[idx]
  REQUESTS.splice(idx, 1)
  ALERTS.unshift({type:'green', text:`${req.cast} のシフトが承認されました`, time:'今'})
  renderRequests()
  renderAlerts()
  animateNum('kpi-requests', REQUESTS.length)
  document.getElementById('reqBadge').textContent = `${REQUESTS.length}件`
  renderStoreList()
}

function rejectRequest(id) {
  const idx = REQUESTS.findIndex(r => r.id === id)
  if (idx === -1) return
  const req = REQUESTS[idx]
  REQUESTS.splice(idx, 1)
  ALERTS.unshift({type:'red', text:`${req.cast} のシフトを却下しました`, time:'今'})
  renderRequests()
  renderAlerts()
  animateNum('kpi-requests', REQUESTS.length)
  document.getElementById('reqBadge').textContent = `${REQUESTS.length}件`
  renderStoreList()
}

// =============================================================================
// PERFORMANCE
// =============================================================================
function renderPerformance() {
  const el = document.getElementById('perfList')
  el.innerHTML = ''

  // 全店舗のキャストを週稼働数でランキング
  const allCasts = Object.values(CASTS_BY_STORE).flat()
  const top = allCasts.sort((a, b) => b.weekCount - a.weekCount).slice(0, 7)
  const maxWeek = Math.max(...top.map(c => c.weekCount))

  top.forEach(cast => {
    const pct = Math.round(cast.weekCount / maxWeek * 100)
    const row = document.createElement('div')
    row.className = 'perf-row'
    row.innerHTML = `
      <div class="perf-name">${cast.name}</div>
      <div class="perf-bar-bg">
        <div class="perf-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="perf-val">${cast.weekCount}日</div>
    `
    el.appendChild(row)
  })
}

// =============================================================================
// ALERTS
// =============================================================================
function renderAlerts() {
  const el = document.getElementById('alertList')
  el.innerHTML = ''
  const colorMap = {green:'var(--green)', amber:'var(--amber)', red:'var(--red)', blue:'var(--blue)'}

  ALERTS.slice(0, 12).forEach(alert => {
    const item = document.createElement('div')
    item.className = 'alert-item'
    item.innerHTML = `
      <div class="alert-dot" style="background:${colorMap[alert.type]}"></div>
      <div class="alert-text">
        ${alert.text}
        <span class="alert-time">${alert.time}</span>
      </div>
    `
    el.appendChild(item)
  })
}

// =============================================================================
// TOOLTIP
// =============================================================================
const tooltip = document.getElementById('tooltip')

function showTooltip(e, cast, statusLabel, shiftStr) {
  document.getElementById('ttName').textContent   = cast.name
  document.getElementById('ttStatus').textContent = statusLabel
  document.getElementById('ttShift').textContent  = shiftStr
  document.getElementById('ttWeek').textContent   = `${cast.weekCount}日`
  document.getElementById('ttTotal').textContent  = `${cast.total}回`
  tooltip.classList.add('show')
  moveTooltip(e)
}

function moveTooltip(e) {
  const x = e.clientX + 14
  const y = e.clientY - 10
  tooltip.style.left = `${Math.min(x, window.innerWidth - 180)}px`
  tooltip.style.top  = `${Math.min(y, window.innerHeight - 120)}px`
}

function hideTooltip() {
  tooltip.classList.remove('show')
}
